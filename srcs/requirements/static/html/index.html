<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inception - kroyo-di</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { text-align: center; padding: 40px; }
        h1 { font-size: 3rem; color: #00d4ff; margin-bottom: 10px; }
        h2 { font-size: 1.2rem; color: #888; margin-bottom: 40px; }
        .services { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .card { background: #16213e; border: 1px solid #00d4ff33; border-radius: 10px; padding: 20px 30px; min-width: 140px; }
        .card h3 { color: #00d4ff; margin-bottom: 8px; }
        .card p { color: #888; font-size: 0.9rem; }
        .footer { margin-top: 40px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Inception</h1>
        <h2>42 School Project — kroyo-di</h2>
        <div class="services">
            <div class="card"><h3>Nginx</h3><p>Reverse Proxy<br>TLS 1.2/1.3</p></div>
            <div class="card"><h3>WordPress</h3><p>CMS<br>PHP-FPM</p></div>
            <div class="card"><h3>MariaDB</h3><p>Database<br>Persistent</p></div>
            <div class="card"><h3>Adminer</h3><p>DB Manager<br>Port 8080</p></div>
            <div class="card"><h3>Redis</h3><p>Cache<br>Port 6379</p></div>
            <div class="card"><h3>FTP</h3><p>File Transfer<br>Port 21</p></div>
        </div>
        <div class="footer">Running on Docker — login.42.fr</div>
    </div>
</body>
</html>
